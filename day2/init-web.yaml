apiVersion: v1
kind: Pod
metadata:
  name: init-web
spec:
  initContainers:
  - name: download
    image: alpine
    command: ['sh', '-c', 'apk update; apk add git; git clone -b develop https://github.com/mariano-italiano/lfd459-Apr.git /app; echo "Git repo cloned and index.html is downloaded"']
    volumeMounts:
    - name: app-data
      mountPath: /app
  containers:
  - image: nginx:1.19.2
    name: nginx
    volumeMounts:
    - name: app-data
      mountPath: /usr/share/nginx/html
  volumes:
  - name: app-data
    emptyDir: {}
