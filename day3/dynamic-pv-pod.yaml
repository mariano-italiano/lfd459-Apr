apiVersion: v1
kind: Pod
metadata:
  name: dynamic-pv-pod
  labels:
    app: pvpod-dynamic
spec:
  containers:
    - name: web
      image: nginx
      volumeMounts:
      - mountPath: "/usr/share/nginx/html"
        name: my-vol
  volumes:
    - name: my-vol
      persistentVolumeClaim:
        claimName: dynamic-pvc 
